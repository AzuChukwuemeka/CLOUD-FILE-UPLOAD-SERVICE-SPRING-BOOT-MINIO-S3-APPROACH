# Local development infrastructure for the file upload service.
#
# The application itself uses an embedded H2 database (file-based, stored under ./data),
# so no database container is required. MinIO provides local, S3-compatible object storage.
#
# Usage:
#   docker compose up -d
#   ./mvnw spring-boot:run
#
# MinIO console: http://localhost:9001 (login with the credentials below)
services:
  minio:
    image: quay.io/minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  minio_data:
